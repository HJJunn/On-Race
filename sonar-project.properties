# On-Race SonarCloud Configuration

# Project identification
sonar.projectKey=Team-six-sense_On-Race
sonar.organization=team-six-sense

# Project metadata
sonar.projectName=On-Race
#sonar.projectVersion=1.0

# Source code directories (monorepo - multi-module)
sonar.sources=backend/gateway/src/main,backend/main/src/main,frontend/src

# Test directories
sonar.tests=backend/gateway/src/test,backend/main/src/test

# TypeScript / JavaScript settings (Frontend)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.tsconfigPath=frontend/tsconfig.json

# Java settings (Backend)
sonar.java.source=21
sonar.java.binaries=.

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.pnpm-store/**

# Encoding
sonar.sourceEncoding=UTF-8
